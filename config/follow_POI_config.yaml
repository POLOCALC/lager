Controller:
  name: Lab Test Controller
  display:
    enable: True
    refresh_rate: 2 # Hz

Drone:
  name: DJI M600
  simulator: False
  connection:
    type: serial
    protocol: DJI OSDK
    port: /dev/serial0
    baudrate: 115200
    timeout: 3
  telemetry:
    frequency: 50  # Hz

Gimbal:
  name: Gremsy T7
  simulator: False
  connection:
    type: serial
    protocol: mavlink
    port: /dev/ttyAMA4
    baudrate: 115200
    timeout: 3
  telemetry:
    heartbeat_frequency: 1  # Hz
    frequency: 50  # Hz

POI:
  name: Fake POI
  latitude: 37.7749
  longitude: -122.4194
  altitude: 30.0
  max_distance: 700.0  # meters